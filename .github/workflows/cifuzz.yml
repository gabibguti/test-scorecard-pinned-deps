name: CIFuzz
on: workflow_dispatch:
permissions:
  contents: read
jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    steps:
    - name: Build Fuzzers
      id: build
      uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@6e9559753fe2276df0f6b83e3fe5a828ac8bd084 # master
      with:
        oss-fuzz-project-name: 'test'
        dry-run: false
    - name: Run Fuzzers
      uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@6e9559753fe2276df0f6b83e3fe5a828ac8bd084 # master
      with:
        oss-fuzz-project-name: 'test'
        fuzz-seconds: 300
        dry-run: false
